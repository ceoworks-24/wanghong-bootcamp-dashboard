<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>왕홍 부트캠프 운영 대시보드</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f6f8;color:#1a1a2e;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:1.5rem}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 1.25rem;border-bottom:1px solid #e2e5eb;margin-bottom:1.5rem}
.hdr-title{font-size:18px;font-weight:700;color:#1a1a2e;letter-spacing:-0.3px}
.hdr-sub{font-size:12px;color:#888;margin-top:3px}
.btn{padding:7px 15px;font-size:12px;border:1px solid #d0d5dd;border-radius:8px;background:#fff;color:#333;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{background:#f0f2f5;border-color:#b0b8c5}
.btn-g{background:#1D9E75;border-color:#1D9E75;color:#fff}
.btn-g:hover{background:#0F6E56;border-color:#0F6E56}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.sc{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid #e8eaed}
.sc-l{font-size:11px;color:#888;margin-bottom:5px;font-weight:500;letter-spacing:0.2px}
.sc-row{display:flex;align-items:baseline;gap:5px}
.sc-v{font-size:24px;font-weight:700;color:#1a1a2e}
.sc-u{font-size:13px;color:#888}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:6px 16px;font-size:12px;border:1px solid #e2e5eb;border-radius:20px;cursor:pointer;background:#fff;color:#666;font-family:inherit;transition:all .15s;font-weight:500}
.tab.on{background:#1D9E75;border-color:#1D9E75;color:#fff}
.panel{border:1px solid #e8eaed;border-radius:12px;margin-bottom:1.25rem;overflow:hidden;background:#fff}
.panel-hdr{padding:11px 16px;background:#f8f9fb;border-bottom:1px solid #e8eaed;font-size:13px;font-weight:600;color:#1a1a2e;display:flex;align-items:center;justify-content:space-between}
.panel-body{padding:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:8px 12px;text-align:left;font-weight:600;color:#666;font-size:11px;border-bottom:1px solid #e8eaed;white-space:nowrap;background:#fafbfc}
tbody tr{border-bottom:1px solid #f0f2f5}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafbfc}
td{padding:8px 12px;color:#1a1a2e;white-space:nowrap}
.badge{display:inline-flex;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600}
.b-ok{background:#e6f7f1;color:#0a6644}
.b-warn{background:#fff8e6;color:#7a4f00}
.b-no{background:#fff0f0;color:#c0392b}
.miss-panel-hdr{padding:11px 16px;background:#fff5f5;border-bottom:1px solid #ffd5d5;font-size:13px;font-weight:600;color:#c0392b}
.miss-chips{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px}
.chip{padding:4px 10px;background:#fff0f0;color:#c0392b;border-radius:12px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.chip-cnt{font-size:10px;font-weight:700;background:#c0392b;color:#fff;border-radius:7px;padding:1px 5px}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;height:5px;background:#eef0f3;border-radius:3px;overflow:hidden;min-width:50px}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.dot-row{display:flex;gap:3px;align-items:center}
.dot{width:13px;height:13px;border-radius:2px;flex-shrink:0}
.dot-fill{background:#1D9E75}
.dot-empty{background:#eef0f3;border:1px solid #d8dce3}
.week-sep{width:1px;height:13px;background:#d0d5dd;flex-shrink:0}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.d-card{background:#f8f9fb;border-radius:10px;padding:11px 13px;border:1px solid #e8eaed}
.d-name{font-size:12px;font-weight:600;color:#1a1a2e;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.chart-wrap{position:relative;width:100%;height:210px}
.loading-box{text-align:center;padding:3rem;color:#888;font-size:13px}
.error-box{background:#fff0f0;color:#c0392b;padding:11px 16px;border-radius:10px;font-size:12px;margin-bottom:1rem;border:1px solid #ffd5d5}
.empty-box{background:#f8f9fb;border-radius:10px;padding:2rem;text-align:center;font-size:13px;color:#aaa;line-height:1.8}
@media(max-width:640px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .detail-grid{grid-template-columns:1fr}
  .panel-body{padding:8px 4px}
}
.panel-body{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{min-width:600px}
</style>
</head>
<body>
<div class="container">
  <div class="hdr">
    <div>
      <div class="hdr-title">왕홍 부트캠프 운영 대시보드</div>
      <div class="hdr-sub" id="upd-label">데이터 불러오는 중...</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn" id="install-btn" style="display:none" onclick="installApp()">📲 홈화면에 추가</button>
      <button class="btn btn-g" onclick="loadCSV()">새로고침</button>
    </div>
  </div>

  <div id="error-area"></div>

  <div class="stats">
    <div class="sc"><div class="sc-l">전체 참가자</div><div class="sc-row"><span class="sc-v" id="s-total">-</span><span class="sc-u">명</span></div></div>
    <div class="sc"><div class="sc-l">이번 주 달성률</div><div class="sc-row"><span class="sc-v" id="s-week-pct" style="color:#1D9E75">-</span><span class="sc-u">%</span></div><div style="font-size:11px;color:#aaa;margin-top:3px" id="s-week-detail"></div></div>
    <div class="sc"><div class="sc-l">이번 주 5건 업로드 미완료</div><div class="sc-row"><span class="sc-v" id="s-miss" style="color:#e74c3c">-</span><span class="sc-u">명</span></div></div>
    <div class="sc"><div class="sc-l">전체 달성률</div><div class="sc-row"><span class="sc-v" id="s-total-pct">-</span><span class="sc-u">%</span></div></div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="setTab('overview',this)">전체 현황</button>
    <button class="tab" onclick="setTab('personal',this)">개인별 현황</button>
    <button class="tab" onclick="setTab('stats',this)">성장 지표</button>
  </div>

  <div id="tab-overview"><div class="loading-box">데이터 불러오는 중...</div></div>
  <div id="tab-personal" style="display:none"></div>
  <div id="tab-stats" style="display:none"></div>
</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS3jWElr8lD4_k6g11JsiQvUsHeijeDJ2EqPBqvA7nVuRt8BnYiTNRHvGpWbEK0M9K3O6rI1VKHBARA/pub?gid=497430891&single=true&output=csv";
const WEEKS=[
  {label:"1주차",dates:"4/13~4/19",start:new Date(2026,3,13),end:new Date(2026,3,19)},
  {label:"2주차",dates:"4/20~4/26",start:new Date(2026,3,20),end:new Date(2026,3,26)},
  {label:"3주차",dates:"4/27~5/3", start:new Date(2026,3,27),end:new Date(2026,4,3)},
  {label:"4주차",dates:"5/4~5/10", start:new Date(2026,4,4), end:new Date(2026,4,10)},
];
const PPW=5;
const EXCLUDED_NAMES=['김혜원'];

function getCurWeek(){
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<WEEKS.length;i++){if(today<=WEEKS[i].end)return i;}
  return WEEKS.length-1;
}
const CUR_WEEK=getCurWeek();
let DATA=[];

function totalDone(p){return p.weeks.reduce((s,w)=>s+(w.uploads===null?0:w.uploads),0);}
function totalPct(p){return Math.round(totalDone(p)/20*100);}
function curWeekUploads(p){const u=p.weeks[CUR_WEEK].uploads;return u===null?0:u;}
function curWeekDone(p){return curWeekUploads(p)>=PPW;}

// ── 누적 페이스 타겟 계산 ──────────────────────────────
// 프로그램 시작일(1주차 월요일)부터 오늘까지 며칠 지났는지로 계산
// 예: 2주차 월요일 = 8일째 → 누적 목표 8건 (단, 주차 최대치 적용)
function calcPaceTarget(){
  const today=new Date();today.setHours(0,0,0,0);
  const programStart=WEEKS[0].start;
  const totalDaysPassed=Math.floor((today-programStart)/(1000*60*60*24))+1;
  // 각 주차는 최대 PPW(5)건씩 누적
  const maxSoFar=(CUR_WEEK+1)*PPW;
  return Math.min(totalDaysPassed,maxSoFar);
}

// ── 상대평가 색깔 계산 ──────────────────────────────
function calcRelativeColors(dataArr){
  const n=dataArr.length;
  if(!n)return{};
  const scores=dataArr.map(p=>totalDone(p));
  const sorted=[...scores].sort((a,b)=>b-a);
  const rankMap={};
  sorted.forEach((s,i)=>{if(!(s in rankMap))rankMap[s]=i+1;});
  const colorMap={};
  dataArr.forEach(p=>{
    const rank=rankMap[totalDone(p)];
    const pct=rank/n;
    let color;
    if(pct<=0.30)color='#27ae60';
    else if(pct<=0.70)color='#f39c12';
    else color='#e74c3c';
    colorMap[p.name]=color;
  });
  return colorMap;
}

function weekBadgeClass(v){
  if(v===null)return'b-no';
  if(v>=PPW)return'b-ok';
  if(v>=3)return'b-warn';
  return'b-no';
}
function weekBadgeText(v){if(v===null)return'미입력';return`✓ ${v}개`;}

function parseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  result.push(cur.trim());return result;
}
function toNum(v){
  if(v===undefined||v===null||v.trim()==='')return null;
  const n=parseInt(v);return isNaN(n)?null:n;
}
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    if(!line.trim())return null;
    const vals=parseCSVLine(line).map(v=>v.replace(/^"|"$/g,''));
    const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]!==undefined?vals[i]:'';});
    const name=obj['이름']||'';
    if(!name)return null;
    if(EXCLUDED_NAMES.includes(name))return null;
    return{name,
      startFollower:toNum(obj['시작_팔로워']),
      startEngagement:toNum(obj['시작_좋아요저장합계']),
      weeks:[1,2,3,4].map(w=>({
        uploads:toNum(obj[`${w}주차_업로드수`]),
        views:toNum(obj[`${w}주차_조회수합계`]),
        comments:toNum(obj[`${w}주차_댓글합계`]),
        follower:toNum(obj[`${w}주차_팔로워`]),
        engagement:toNum(obj[`${w}주차_좋아요저장합계`]),
      }))
    };
  }).filter(Boolean);
}

function calcStats(){
  const total=DATA.length;
  document.getElementById('s-total').textContent=total;
  const weekTarget=total*PPW;
  const weekUploaded=DATA.reduce((s,p)=>s+curWeekUploads(p),0);
  document.getElementById('s-week-pct').textContent=weekTarget?Math.round(weekUploaded/weekTarget*100):0;
  document.getElementById('s-week-detail').textContent=weekTarget?`${weekUploaded}/${weekTarget}건`:'';
  const weekMiss=DATA.filter(p=>!curWeekDone(p)).length;
  document.getElementById('s-miss').textContent=weekMiss;
  const allDone=DATA.reduce((s,p)=>s+totalDone(p),0);
  document.getElementById('s-total-pct').textContent=total?Math.round(allDone/(total*20)*100):0;
}

function renderOverview(){
  const colorMap=calcRelativeColors(DATA);

  // ── 수정된 페이스 타겟: 누적 기준 ──
  const paceTarget=calcPaceTarget();

  // 우수 참가자: 누적 업로드 수 >= 누적 페이스 타겟
  const goodList=DATA.filter(p=>totalDone(p)>=paceTarget);

  // 필요 참가자: 누적 업로드 수 < 누적 페이스 타겟, 업로드 적은 순 정렬
  const missSorted=[...DATA.filter(p=>totalDone(p)<paceTarget)]
    .sort((a,b)=>totalDone(a)-totalDone(b));

  let html='';

  html+=`<div class="panel">
    <div style="padding:11px 16px;background:#f0faf5;border-bottom:1px solid #b7e4cc;font-size:13px;font-weight:600;color:#0a6644">🌟 ${WEEKS[CUR_WEEK].label} 업로드 우수 참가자 (${goodList.length}명 · 오늘 기준 누적 ${paceTarget}건 이상)</div>
    <div class="miss-chips">`;
  if(goodList.length){
    goodList.forEach(p=>{
      const u=totalDone(p);
      const diff=u-paceTarget;
      html+=`<span style="padding:4px 10px;background:#e6f7f1;color:#0a6644;border-radius:12px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px">${p.name}<span style="font-size:10px;font-weight:700;background:#0a6644;color:#fff;border-radius:7px;padding:1px 5px">${diff>=0?'+':''}${diff}건</span></span>`;
    });
  }else{
    html+=`<span style="font-size:12px;color:#aaa">아직 해당자가 없습니다</span>`;
  }
  html+='</div></div>';

  if(missSorted.length){
    html+=`<div class="panel">
      <div class="miss-panel-hdr">⚠ ${WEEKS[CUR_WEEK].label} 업로드 필요 참가자 (${missSorted.length}명 · 오늘 기준 누적 ${paceTarget}건 미달)</div>
      <div class="miss-chips">`;
    missSorted.forEach(p=>{
      const remain=paceTarget-totalDone(p);
      html+=`<span class="chip">${p.name}<span class="chip-cnt">-${remain}개</span></span>`;
    });
    html+='</div></div>';
  }else{
    html+=`<div class="panel"><div class="panel-hdr" style="color:#0a6644">✓ ${WEEKS[CUR_WEEK].label} 전원 업로드 완료!</div></div>`;
  }

  const sorted=[...DATA].sort((a,b)=>totalDone(b)-totalDone(a));
  html+=`<div class="panel"><div class="panel-hdr"><span>참가자별 전체 진행 현황</span><span style="font-size:11px;font-weight:400;color:#888">달성률 높은 순</span></div><div class="panel-body" style="padding:0">`;
  html+=`<table><thead><tr><th>이름</th><th style="min-width:110px">전체 달성률</th><th>업로드</th>`;
  WEEKS.forEach(w=>{html+=`<th>${w.label}<br><span style="font-size:10px;font-weight:400;color:#aaa">${w.dates}</span></th>`;});
  html+='</tr></thead><tbody>';
  sorted.forEach(p=>{
    const done=totalDone(p),pc=totalPct(p);
    const c=colorMap[p.name]||'#888';
    const uploadBg=c==='#27ae60'?'#e8f8ee':c==='#f39c12'?'#fff8e6':'#fff0f0';
    const uploadTxt=c==='#27ae60'?'#1a7a3a':c==='#f39c12'?'#7a4f00':'#c0392b';
    html+=`<tr><td style="font-weight:600">${p.name}</td>
    <td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pc}%;background:${c}"></div></div><span style="font-size:11px;color:#888;min-width:26px">${pc}%</span></div></td>
    <td><span style="font-weight:700;color:${uploadTxt};background:${uploadBg};padding:3px 8px;border-radius:8px;font-size:12px">${done}/20</span></td>`;
    p.weeks.forEach(w=>{
      const bg=c==='#27ae60'?'#e8f8ee':c==='#f39c12'?'#fff8e6':'#fff0f0';
      const tc=c==='#27ae60'?'#1a7a3a':c==='#f39c12'?'#7a4f00':'#c0392b';
      html+=`<td><span class="badge" style="background:${bg};color:${tc}">${weekBadgeText(w.uploads)}</span></td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';

  html+=`<div class="panel"><div class="panel-hdr">주차별 입력 현황 요약</div><div class="panel-body" style="padding:0"><table><thead><tr><th>주차</th><th>기간</th><th>5건 완료자</th><th>5건 미완료자</th><th>5건 완료율</th></tr></thead><tbody>`;
  WEEKS.forEach((w,wi)=>{
    const done=DATA.filter(p=>p.weeks[wi].uploads===PPW).length;
    const total=DATA.length,miss=total-done;
    const pc=total?Math.round(done/total*100):0;
    const c=pc>=75?'#27ae60':pc>=50?'#f39c12':'#e74c3c';
    html+=`<tr><td style="font-weight:600">${w.label}</td><td style="color:#888">${w.dates}</td>
    <td><span style="color:#0a6644;font-weight:600">${done}명</span></td>
    <td>${miss>0?`<span style="color:#c0392b;font-weight:600">${miss}명</span>`:`<span style="color:#0a6644">없음</span>`}</td>
    <td><span style="color:${c};font-weight:600">${pc}%</span></td></tr>`;
  });
  html+='</tbody></table></div></div>';
  document.getElementById('tab-overview').innerHTML=html;
}

function renderPersonal(){
  if(!DATA.length){document.getElementById('tab-personal').innerHTML='<div class="empty-box">데이터가 없습니다</div>';return;}
  const colorMap=calcRelativeColors(DATA);
  const sorted=[...DATA].sort((a,b)=>totalDone(b)-totalDone(a));
  let html=`<div class="detail-grid">`;
  sorted.forEach(p=>{
    const done=totalDone(p),pc=totalPct(p);
    const color=colorMap[p.name]||'#888';
    const cardBorder=color==='#27ae60'?'#b7e4cc':color==='#f39c12'?'#ffd89a':'#ffb3b3';
    const fl0=p.startFollower;
    const eng0=p.startEngagement;
    const flLatest=p.weeks.slice().reverse().find(w=>w.follower!==null)?.follower??null;
    const engLatest=p.weeks.slice().reverse().find(w=>w.engagement!==null)?.engagement??null;

    function makeLatestHtml(start,latest){
      if(start!==null&&latest!==null){
        const c=latest>start?'#1D9E75':latest<start?'#e74c3c':'#888';
        return`<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px"><span style="color:#aaa">${start}</span><span style="color:#aaa">→</span><span style="color:${c};font-weight:700">${latest}</span></span>`;
      }else if(start!==null){
        return`<span style="font-size:11px;color:#aaa">${start}</span>`;
      }
      return`<span style="font-size:11px;color:#ccc">-</span>`;
    }
    const flHtml=makeLatestHtml(fl0,flLatest);
    const engHtml=makeLatestHtml(eng0,engLatest);

    html+=`<div class="d-card" style="border-color:${cardBorder}">
      <div class="d-name"><span>${p.name}</span><span style="color:${color};font-size:11px;font-weight:600">${done}/20개</span></div>
      <div style="height:4px;background:#eef0f3;border-radius:2px;margin-bottom:8px"><div style="height:100%;width:${pc}%;background:${color};border-radius:2px"></div></div>
      <div class="dot-row" style="margin-bottom:8px">`;
    p.weeks.forEach((w,wi)=>{
      if(wi>0)html+=`<div class="week-sep"></div>`;
      for(let d=0;d<PPW;d++){
        const filled=w.uploads!==null&&d<w.uploads;
        html+=`<div class="dot" style="${filled?`background:${color}`:'background:#eef0f3;border:1px solid #d8dce3'}"></div>`;
      }
    });
    html+=`</div><div style="display:flex;gap:12px;font-size:11px;color:#888"><span>팔로워 ${flHtml}</span><span>좋아요+저장 ${engHtml}</span></div></div>`;
  });
  html+='</div>';
  document.getElementById('tab-personal').innerHTML=html;
}

let chartObjs=[];
function renderStats(){
  const colors=['#1D9E75','#3266ad','#EF9F27','#E24B4A','#7F77DD','#D85A30','#D4537E','#639922','#BA7517','#0F6E56','#185FA5','#993556','#3B6D11','#854F0B','#533AAA','#2E86AB'];
  const wLabels=WEEKS.map(w=>w.label);
  const active=DATA.filter(p=>p.weeks.some(w=>w.uploads!==null));
  if(!active.length){
    document.getElementById('tab-stats').innerHTML='<div class="empty-box">아직 입력된 데이터가 없어요.<br>운영진이 (대시보드DB) 탭에 데이터를 입력하면 차트가 표시됩니다.</div>';return;
  }
  let html=`<div class="panel"><div class="panel-hdr">조회수 추이 (주차별)</div><div class="panel-body"><div class="chart-wrap"><canvas id="c-views"></canvas></div></div></div>`;
  html+=`<div class="panel"><div class="panel-hdr">팔로워 성장 추이 (주차별)</div><div class="panel-body"><div class="chart-wrap"><canvas id="c-follower"></canvas></div></div></div>`;
  html+=`<div class="panel"><div class="panel-hdr">좋아요+저장 합계 추이 (주차별)</div><div class="panel-body"><div class="chart-wrap"><canvas id="c-eng"></canvas></div></div></div>`;
  document.getElementById('tab-stats').innerHTML=html;
  chartObjs.forEach(c=>{try{c.destroy()}catch(e){}});chartObjs=[];
  setTimeout(()=>{
    const mkDs=key=>active.map((p,ci)=>({label:p.name,tension:0.3,pointRadius:4,spanGaps:false,borderColor:colors[ci%colors.length],backgroundColor:colors[ci%colors.length]+'22',data:p.weeks.map(w=>w[key])}));
    const chartOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{font:{size:10}}},x:{ticks:{font:{size:11}}}}};
    chartObjs.push(new Chart(document.getElementById('c-views'),{type:'line',data:{labels:wLabels,datasets:mkDs('views')},options:chartOpts}));
    chartObjs.push(new Chart(document.getElementById('c-follower'),{type:'line',data:{labels:['시작',...wLabels],datasets:active.map((p,ci)=>({label:p.name,tension:0.3,pointRadius:4,spanGaps:false,borderColor:colors[ci%colors.length],backgroundColor:colors[ci%colors.length]+'22',data:[p.startFollower,...p.weeks.map(w=>w.follower)]}))},options:chartOpts}));
    chartObjs.push(new Chart(document.getElementById('c-eng'),{type:'line',data:{labels:['시작',...wLabels],datasets:active.map((p,ci)=>({label:p.name,tension:0.3,pointRadius:4,spanGaps:false,borderColor:colors[ci%colors.length],backgroundColor:colors[ci%colors.length]+'22',data:[p.startEngagement,...p.weeks.map(w=>w.engagement)]}))},options:chartOpts}));
  },100);
}

function setTab(t,el){
  ['overview','personal','stats'].forEach(id=>{document.getElementById('tab-'+id).style.display='none';});
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-'+t).style.display='';
  if(t==='stats')renderStats();
}

function loadCSV(){
  document.getElementById('upd-label').textContent='데이터 불러오는 중...';
  document.getElementById('error-area').innerHTML='';
  fetch(CSV_URL)
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(csv=>{
      DATA=parseCSV(csv);calcStats();renderOverview();renderPersonal();
      const cur=document.querySelector('.tab.on');
      if(cur&&cur.textContent.includes('성장'))renderStats();
      document.getElementById('upd-label').textContent='마지막 업데이트: '+new Date().toLocaleTimeString('ko-KR')+' · Google Sheets 연동 (총 '+DATA.length+'명)';
    })
    .catch(e=>{
      document.getElementById('error-area').innerHTML=`<div class="error-box">데이터를 불러오지 못했습니다. 잠시 후 새로고침해주세요. (${e.message})</div>`;
      document.getElementById('upd-label').textContent='연결 실패';
    });
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-btn').style.display='';
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-btn').style.display='none';deferredPrompt=null;
});
function installApp(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-btn').style.display='none';});
}

loadCSV();
</script>
</body>
</html>
